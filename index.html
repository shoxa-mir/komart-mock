<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<title>KoMart · Customer · iPhone 17 Pro demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100dvh;overflow:hidden;font-family:'Manrope',-apple-system,'Segoe UI',Roboto,sans-serif;color:#e6e1d5;background:#050402}
body{
  display:flex;
  flex-direction:row;
  background:radial-gradient(80% 60% at 30% 20%, #1A1814 0%, #0B0A08 60%, #050402 100%);
}

/* ---------------- Left rail ---------------- */
.rail{
  width:260px;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  padding:28px 22px;
  background:rgba(255,255,255,.03);
  border-right:1px solid rgba(255,255,255,.08);
  overflow-y:auto;
  scrollbar-width:thin;
  scrollbar-color:rgba(255,255,255,.15) transparent;
}
.rail::-webkit-scrollbar{width:6px}
.rail::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}

.brand{display:flex;align-items:center;gap:10px}
.brand .logo{width:28px;height:28px;border-radius:8px;background:#0F0E0C;color:#fff;display:grid;place-items:center;font-weight:800;font-size:16px;border:1px solid rgba(255,255,255,.12)}
.brand .name{font-size:14px;font-weight:800;color:#f3eee2;letter-spacing:-.01em}
.subtitle{margin-top:6px;font-size:11.5px;color:#8a857c;line-height:1.4}

.group-label{
  text-transform:uppercase;
  font-size:11px;
  letter-spacing:.08em;
  color:#8a857c;
  margin-top:18px;
  margin-bottom:8px;
  font-weight:700;
}
.entry{
  display:block;
  padding:8px 10px;
  border-radius:8px;
  font-size:13px;
  font-weight:600;
  color:#d8d3c8;
  cursor:pointer;
  user-select:none;
  border:0;
  background:transparent;
  text-align:left;
  width:100%;
  font-family:inherit;
  transition:background .12s ease, color .12s ease;
}
.entry + .entry{margin-top:2px}
.entry:hover{background:rgba(255,255,255,.05)}
.entry.is-active{background:rgba(255,255,255,.08);color:#fff;box-shadow:inset 3px 0 0 #B05468}

/* ---------------- Stage ---------------- */
.stage{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  min-width:0;
}

/* Phone — iPhone 17 Pro at 402×874 logical */
.phone{
  position:relative;
  width:426px;          /* 402 + 2*12 bezel */
  height:898px;         /* 874 + 2*12 bezel */
  border-radius:56px;
  background:linear-gradient(135deg,#3A3733,#1E1C19 40%,#2D2A26 70%,#48443F);
  padding:12px;
  box-shadow:
    0 40px 80px -30px rgba(0,0,0,.7),
    0 0 0 1px rgba(255,255,255,.05) inset,
    0 2px 0 rgba(255,255,255,.1) inset;
}
.phone .screen{
  position:relative;
  width:402px;
  height:874px;
  border-radius:48px;
  overflow:hidden;
  background:#000;
}
.phone iframe{
  width:402px;
  height:874px;
  border:0;
  display:block;
  border-radius:48px;
  background:#000;
}
/* Dynamic Island sits above iframe */
.phone .island{
  position:absolute;
  top:11px;
  left:50%;
  transform:translateX(-50%);
  width:126px;
  height:37px;
  border-radius:99px;
  background:#000;
  z-index:5;
  box-shadow:0 0 0 1px rgba(0,0,0,.8);
}
/* Buttons — protrude 3px from bezel outer edges */
.btn-side{
  position:absolute;
  width:3px;
  border-radius:2px;
  background:linear-gradient(180deg,#2A2823,#4A4742,#2A2823);
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.4);
}
.btn-right-action{right:-3px;top:180px;height:38px}
.btn-right-power{right:-3px;top:240px;height:96px}
.btn-left-ring{left:-3px;top:158px;height:24px}
.btn-left-volup{left:-3px;top:210px;height:54px}
.btn-left-voldn{left:-3px;top:290px;height:54px}

/* ---------------- Right rail ---------------- */
.rrail{
  width:240px;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  padding:28px 22px;
  border-left:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.02);
  gap:14px;
  overflow-y:auto;
}
.rrail .label{
  text-transform:uppercase;
  font-size:11px;
  letter-spacing:.08em;
  color:#8a857c;
  font-weight:700;
}
.ctrl-btn{
  display:block;
  width:100%;
  padding:10px 12px;
  border-radius:10px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  color:#f0ebde;
  font-family:inherit;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  text-align:left;
  transition:background .12s ease, transform .1s ease;
}
.ctrl-btn:hover{background:rgba(255,255,255,.1)}
.ctrl-btn:active{transform:scale(.98)}
.ctrl-msg{
  font-size:11.5px;
  color:#8a857c;
  height:14px;
}
.hint{
  margin-top:8px;
  font-size:11.5px;
  color:#8a857c;
  line-height:1.55;
  padding:10px 12px;
  border-radius:10px;
  background:rgba(255,255,255,.02);
  border:1px dashed rgba(255,255,255,.08);
}
.legend{
  margin-top:auto;
  padding:12px;
  border-radius:10px;
  background:rgba(176,84,104,.08);
  border:1px solid rgba(176,84,104,.18);
  font-size:12px;
  line-height:1.5;
}
.legend .legend-num{font-weight:800;color:#fff}
.legend .legend-title{color:#f3eee2;font-weight:700}
.legend .legend-ctx{color:#8a857c;margin-top:4px}

@media (max-width:1180px){
  .rail{width:220px}
  .rrail{width:210px}
}
@media (max-height:920px){
  .phone{transform:scale(.92);transform-origin:center}
}
@media (max-height:840px){
  .phone{transform:scale(.82)}
}
</style>
</head>
<body>

<aside class="rail">
  <div class="brand">
    <div class="logo">K</div>
    <div class="name">KoMart · Customer</div>
  </div>
  <div class="subtitle">iPhone 17 Pro · 402×874 · клиентский прототип</div>

  <div id="rail-list"></div>
</aside>

<main class="stage">
  <div class="phone" aria-label="iPhone 17 Pro">
    <div class="btn-side btn-left-ring"></div>
    <div class="btn-side btn-left-volup"></div>
    <div class="btn-side btn-left-voldn"></div>
    <div class="btn-side btn-right-action"></div>
    <div class="btn-side btn-right-power"></div>
    <div class="screen">
      <iframe id="screen" src="pages/splash.html" allow="autoplay" title="KoMart screen"></iframe>
      <div class="island" aria-hidden="true"></div>
    </div>
  </div>
</main>

<aside class="rrail">
  <div class="label">Управление</div>
  <button class="ctrl-btn" id="btn-reset">Сбросить состояние</button>
  <button class="ctrl-btn" id="btn-highlight">Подсветить кликабельные зоны</button>
  <button class="ctrl-btn" id="btn-copy">Копировать ссылку</button>
  <div class="ctrl-msg" id="ctrl-msg"></div>
  <div class="hint">Клавиша <b>H</b> — подсветить зоны<br>← / → — следующий / предыдущий экран</div>
  <div class="legend" id="legend">
    <div><span class="legend-num">01</span> · <span class="legend-title">Splash</span></div>
    <div class="legend-ctx">Запуск</div>
  </div>
</aside>

<script>
(function(){
  // Groups → flat list. Filename === slug.
  var GROUPS = [
    {label:'Запуск', items:[
      ['splash','01 Splash'],
      ['langSelect','02 Выбор языка'],
      ['onboarding','03 Онбординг']
    ]},
    {label:'Авторизация', items:[
      ['phoneLogin','04 Вход по телефону'],
      ['smsCode','05 Код из SMS'],
      ['createAccount','06 Создание аккаунта']
    ]},
    {label:'Главная', items:[
      ['home','07 Главная'],
      ['kBeauty','08 K-Beauty'],
      ['kStore','09 K-Store']
    ]},
    {label:'Каталог', items:[
      ['categories','10 Категории'],
      ['ramenSubcategory','11 Подкатегория Рамен'],
      ['catalog','12 Каталог'],
      ['search','13 Поиск']
    ]},
    {label:'Товар', items:[
      ['product','14 Карточка товара'],
      ['reviews','15 Отзывы']
    ]},
    {label:'Покупка', items:[
      ['cart','16 Корзина'],
      ['checkoutBelowThreshold','17 Оформление (до порога)'],
      ['checkoutFreeShipping','18 Оформление (бесплатная доставка)'],
      ['orderPlaced','19 Заказ оформлен']
    ]},
    {label:'Аккаунт', items:[
      ['favorites','20 Избранное'],
      ['profile','21 Профиль']
    ]}
  ];

  var FLAT = [];
  GROUPS.forEach(function(g){
    g.items.forEach(function(it){
      FLAT.push({slug:it[0], title:it[1], group:g.label});
    });
  });

  var iframe = document.getElementById('screen');
  var msg = document.getElementById('ctrl-msg');
  var legend = document.getElementById('legend');
  var railList = document.getElementById('rail-list');

  // Build rail
  GROUPS.forEach(function(g){
    var lbl = document.createElement('div');
    lbl.className = 'group-label';
    lbl.textContent = g.label;
    railList.appendChild(lbl);
    g.items.forEach(function(it){
      var b = document.createElement('button');
      b.type = 'button';
      b.className = 'entry';
      b.dataset.slug = it[0];
      b.textContent = it[1];
      b.addEventListener('click', function(){ go(it[0]); });
      railList.appendChild(b);
    });
  });

  function findIdx(slug){
    for(var i=0;i<FLAT.length;i++) if(FLAT[i].slug === slug) return i;
    return -1;
  }
  function currentSlug(){
    var h = (location.hash || '').replace(/^#/,'');
    if(h && findIdx(h) >= 0) return h;
    return 'splash';
  }
  function setActive(slug){
    var entries = railList.querySelectorAll('.entry');
    for(var i=0;i<entries.length;i++){
      if(entries[i].dataset.slug === slug) entries[i].classList.add('is-active');
      else entries[i].classList.remove('is-active');
    }
    var idx = findIdx(slug);
    var item = idx >= 0 ? FLAT[idx] : FLAT[0];
    var num = item.title.split(' ')[0];
    var title = item.title.replace(/^\d+\s+/,'');
    legend.innerHTML =
      '<div><span class="legend-num">'+num+'</span> · <span class="legend-title">'+title+'</span></div>' +
      '<div class="legend-ctx">'+item.group+'</div>';
  }
  function go(slug, push){
    var idx = findIdx(slug);
    if(idx < 0) slug = 'splash';
    iframe.src = 'pages/' + slug + '.html';
    setActive(slug);
    if(push !== false){
      try{ history.replaceState(null,'', '#'+slug); }catch(e){}
    }
  }

  // Initial
  go(currentSlug(), false);

  // Hash sync
  window.addEventListener('popstate', function(){
    go(currentSlug(), false);
  });
  window.addEventListener('hashchange', function(){
    go(currentSlug(), false);
  });

  // Right rail buttons
  document.getElementById('btn-reset').addEventListener('click', function(){
    try{
      var w = iframe.contentWindow;
      if(w && w.kom) w.kom.reset();
    }catch(e){}
    // Also clear top-level storage (same origin)
    try{
      localStorage.removeItem('kom_cart');
      localStorage.removeItem('kom_favs');
      localStorage.removeItem('kom_lang');
      localStorage.removeItem('kom_seen_onboarding');
    }catch(e){}
    // Reload iframe
    iframe.src = iframe.src;
    flashMsg('Состояние сброшено');
  });
  document.getElementById('btn-highlight').addEventListener('click', highlight);
  document.getElementById('btn-copy').addEventListener('click', function(){
    var url = location.href;
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(url).then(function(){ flashMsg('Скопировано'); }, function(){ flashMsg('Не удалось'); });
    }else{
      try{
        var ta = document.createElement('textarea');
        ta.value = url; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        flashMsg('Скопировано');
      }catch(e){ flashMsg('Не удалось'); }
    }
  });
  function flashMsg(text){
    msg.textContent = text;
    clearTimeout(flashMsg._t);
    flashMsg._t = setTimeout(function(){ msg.textContent = ''; }, 1600);
  }
  function highlight(){
    try{
      iframe.contentWindow.postMessage({type:'kom:highlight'}, '*');
    }catch(e){}
  }

  // Keyboard
  window.addEventListener('keydown', function(e){
    var tag = (e.target && e.target.tagName) || '';
    if(tag === 'INPUT' || tag === 'TEXTAREA') return;
    if(e.key === 'h' || e.key === 'H'){ highlight(); return; }
    if(e.key === 'ArrowLeft'){
      var i = findIdx(currentSlug());
      var ni = (i - 1 + FLAT.length) % FLAT.length;
      go(FLAT[ni].slug);
    }else if(e.key === 'ArrowRight'){
      var i2 = findIdx(currentSlug());
      var ni2 = (i2 + 1) % FLAT.length;
      go(FLAT[ni2].slug);
    }
  });
})();
</script>
</body>
</html>
