<!DOCTYPE html>

    <div class="kom-scroll">
      <div style="flex:1;display:flex;flex-direction:column;padding:34px 24px 24px;min-height:calc(100vh - 120px)">

        <div style="font-size:27px;font-weight:800;letter-spacing:-.02em;margin-top:22px;line-height:1.2">Выберите язык</div>

        <div style="display:flex;flex-direction:column;gap:12px;margin-top:28px">
          <a class="tap" href="onboarding.html" onclick="if(window.kom)kom.setLang('en')" style="display:flex;align-items:center;justify-content:space-between;padding:17px 20px;border:1.5px solid #EAE3D8;border-radius:18px;background:#fff;text-decoration:none;color:inherit">
            <div><div style="font-size:16px;font-weight:700">English</div><div style="font-size:11.5px;font-weight:600;color:#9A9183;margin-top:2px">English</div></div>

          <a class="tap" href="onboarding.html" onclick="if(window.kom)kom.setLang('ru')" style="display:flex;align-items:center;justify-content:space-between;padding:17px 20px;border:2px solid #2B2723;border-radius:18px;background:#FAF7F2;box-shadow:0 10px 22px -14px rgba(43,39,35,.4);text-decoration:none;color:inherit">

          <a class="tap" href="onboarding.html" onclick="if(window.kom)kom.setLang('uz')" style="display:flex;align-items:center;justify-content:space-between;padding:17px 20px;border:1.5px solid #EAE3D8;border-radius:18px;background:#fff;text-decoration:none;color:inherit">
            <div><div style="font-size:16px;font-weight:700">Oʻzbekcha</div><div style="font-size:11.5px;font-weight:600;color:#9A9183;margin-top:2px">Uzbek · lotin</div></div>
            <div style="width:22px;height:22px;border-radius:99px;border:2px solid #D9CFC2"></div>
          </a>
          <a class="tap" href="onboarding.html" onclick="if(window.kom)kom.setLang('uz-cy')" style="display:flex;align-items:center;justify-content:space-between;padding:17px 20px;border:1.5px solid #EAE3D8;border-radius:18px;background:#fff;text-decoration:none;color:inherit">
