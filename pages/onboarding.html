<!DOCTYPE html>

      <div style="flex:1;display:flex;flex-direction:column;padding:14px 24px 28px;min-height:calc(100vh - 140px)">

            <div style="font-size:10px;font-weight:800;letter-spacing:.1em;color:#3F7330">K-STORE</div>
